<!DOCTYPE html>
<html>
<head>
    <title>Aastha's Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        header {
            padding: 50px;
        }

        h1 {
            font-size: 50px;
        }

        .btn {
            padding: 12px 25px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .section {
            padding: 50px;
            background: white;
            color: black;
        }

        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            width: 250px;
            background: #f4f4f4;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome Aastha</h1>
    <p>This website is deployed using Jenkins + Docker</p>
    <button class="btn">Explore</button>
</header>

<div class="section">
    <h2>My Features</h2>

    <div class="card">
        <h3>Fast</h3>
        <p>Optimized frontend experience</p>
    </div>

    <div class="card">
        <h3>Responsive</h3>
        <p>Works on all devices</p>
    </div>

    <div class="card">
        <h3>Modern</h3>
        <p>Clean and attractive UI</p>
    </div>
</div>

</body>
</html>
